name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 使用 Java 17，與 GitHub 內建的 Android SDK 版本完美匹配
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev uuid-dev
          pip3 install --user --upgrade buildozer Cython

      # ==========================================================
      # 關鍵核心：將 GitHub 系統內建的完美 SDK/NDK 直接映射給 Buildozer
      # ==========================================================
      - name: Standardize Android SDK/NDK Links
        run: |
          # 1. 建立 buildozer 的平台目標目錄
          mkdir -p ~/.buildozer/android/platform/
          
          # 2. 直接把系統內建、完全合規可執行的 Android SDK 軟連結過去
          ln -s /usr/local/lib/android/sdk ~/.buildozer/android/platform/android-sdk
          
          # 3. 自動偵測並軟連結系統內建最穩定的 Android NDK 版本
          SYSTEM_NDK=$(ls -d /usr/local/lib/android/sdk/ndk/* | head -n 1)
          echo "偵測到系統原生 NDK 位置: $SYSTEM_NDK"
          ln -s "$SYSTEM_NDK" ~/.buildozer/android/platform/android-ndk

      # ==========================================================
      # 執行編譯（帶入環境變數，強迫覆蓋設定）
      # ==========================================================
      - name: Build with Buildozer
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          # 執行打包
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
