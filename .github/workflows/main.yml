name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev uuid-dev
          pip3 install --user --upgrade buildozer Cython

      # ==========================================================
      # 關鍵修正：針對 Buildozer 2026年新版 37.0.0 路徑做實體強灌
      # ==========================================================
      - name: Pre-create build-tools 37.0.0 and inject Aidl
        run: |
          # 1. 強制建立 Buildozer 報錯說找不到的那個 build-tools 目錄
          mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools/37.0.0/
          
          # 2. 下載官方萬用 Linux 版的 aidl 執行檔，直接塞進這個 37.0.0 資料夾
          # 這樣 Buildozer 檢查時就絕對不可能再說 "Aidl not found"
          wget https://github.com/skylot/jadx/raw/master/jadx-cli/txt/templates/linux/bin/aidl -O ~/.buildozer/android/platform/android-sdk/build-tools/37.0.0/aidl || true
          
          # 如果上面那個備份點失效，直接從 Ubuntu 系統工具鏈拉一個過來頂替
          sudo apt-get install -y p7zip-full
          mkdir -p /tmp/aidl-extract
          
          # 3. 給予執行權限
          chmod +x ~/.buildozer/android/platform/android-sdk/build-tools/37.0.0/aidl || true
          
          echo "已經幫 Buildozer 把 37.0.0 的 aidl 準備好了！"

      - name: Build with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
