name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev uuid-dev
          pip3 install --user buildozer

      # ==========================================================
      # 第一階段：引導並強迫 Buildozer 生出它的內部資料夾
      # ==========================================================
      - name: Force Buildozer to initialize SDK
        run: |
          # 讓它跑一下，它一定會失敗卡在 aidl，但這樣它就會把它的 Android SDK 目錄結構生出來
          buildozer -v android debug || true

      # ==========================================================
      # 終極修正：直接把系統現成的 aidl 硬塞進 Buildozer 的沙盒路徑裡
      # ==========================================================
      - name: Hard Inject Aidl & Sdkmanager into Buildozer path
        run: |
          # 1. 找出 Buildozer 到底把它的 build-tools 藏在哪裡 (通常是 33.0.1 或其他版本)
          TARGET_DIR=$(dirname $(find ~/.buildozer/android/platform/ -name "lib" -path "*/build-tools/*" | head -n 1))
          echo "Target build-tools directory is: $TARGET_DIR"
          
          # 2. 直接把 GitHub 系統現成可運行的 aidl 複製進去覆蓋，讓它不用去別的地方抓
          if [ -d "$TARGET_DIR" ]; then
            sudo cp /usr/local/lib/android/sdk/build-tools/33.0.1/aidl "$TARGET_DIR/aidl"
            sudo chmod +x "$TARGET_DIR/aidl"
            echo "Aidl successfully injected!"
          else
            echo "Warning: Target directory not found, fallback to multi-version linkage."
            # 預防萬一，如果它還沒生出 build-tools，我們強制幫它建立多個版本的軟連結
            for ver in 33.0.1 34.0.0 30.0.3; do
              mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools/$ver/
              sudo ln -s /usr/local/lib/android/sdk/build-tools/33.0.1/aidl ~/.buildozer/android/platform/android-sdk/build-tools/$ver/aidl || true
            done
          fi

          # 3. 同步修正新版 sdkmanager 找不到的潛在問題
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin/
          # 尋找 Buildozer 真正下載的 sdkmanager，拉一個捷徑給它舊路徑
          REAL_SDKMANAGER=$(find ~/.buildozer/android/platform/ -name "sdkmanager" | head -n 1)
          if [ ! -z "$REAL_SDKMANAGER" ]; then
            ln -s "$REAL_SDKMANAGER" ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          fi

      # ==========================================================
      # 第二階段：原地復活，重啟編譯（這一次它絕對能找到 aidl 了）
      # ==========================================================
      - name: Resume Build with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
