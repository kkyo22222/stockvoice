name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev uuid-dev
          pip3 install --user --upgrade buildozer Cython

      # ==========================================================
      # 最終關鍵：利用系統內建的 sdkmanager 預先同意所有 Android 官方授權
      # ==========================================================
      - name: Auto Accept Android Licenses
        run: |
          # 使用 yes 指令，把 y 灌進 sdkmanager 裡，提前把所有的合約都簽好
          if [ -d "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" ]; then
            yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          fi

      # ==========================================================
      # 強制編譯與轉址鏈
      # ==========================================================
      - name: Force Build Android APK
        run: |
          # 1. 讓 buildozer 跑起來，建立目錄
          buildozer android logcat || true
          buildozer -v android debug || true
          
          # 2. 強植舊路徑轉址
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin/
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/
          
          sudo cp /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          sudo cp /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager || true
          sudo chmod +x ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          
          # 3. 在執行最終編譯時，同樣掛上 yes 應答機制確保萬無一失
          echo "【授權已簽署】重啟最終編譯..."
          yes | buildozer -v android debug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
