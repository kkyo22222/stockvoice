name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev uuid-dev
          pip3 install --user --upgrade buildozer Cython

      # ==========================================================
      # 終極合體：一氣呵成配置所有路徑、授權，並立刻啟動編譯
      # ==========================================================
      - name: Pre-populate Android SDK and Run Buildozer
        run: |
          # 1. 建立 Buildozer 預期的所有新舊 SDK 目錄結構
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # 2. 下載官方最新版的 Android 命令行工具 (提供真正的 sdkmanager)
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          
          # 3. 同時塞滿新舊路徑，這樣它用哪種方式找 sdkmanager 都不可能失敗
          cp -r cmdline-tools/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
          cp ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          chmod +x ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          chmod +x ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager

          # 4. 強制寫入上一關通關的「萬能授權簽名章」
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7431302450f3544353\n24333f1a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          
          echo "【路徑與授權實體強灌完成】立刻啟動編譯..."
          
          # 5. 在同一個 Process 中原地啟動 Buildozer，不給系統任何重置的空隙
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
