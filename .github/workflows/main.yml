name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev uuid-dev
          pip3 install --user --upgrade buildozer Cython

      # ==========================================================
      # 終極權限防禦：強行塞入 sdkmanager 檔案並「鎖死唯讀」
      # ==========================================================
      - name: Inoculate and Lock SDK Path
        run: |
          # 1. 強制預先建立 Buildozer 報錯的那串老舊路徑
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # 2. 直接拿 GitHub 系統內建 100% 完整無缺的官方 sdkmanager（包含它周邊的 Java 類別庫）
          # 我們把整個 cmdline-tools 實體覆蓋到舊路徑 tools 裡
          sudo cp -r /usr/local/lib/android/sdk/cmdline-tools/latest/* ~/.buildozer/android/platform/android-sdk/tools/
          
          # 3. 寫入萬能授權簽名章
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7431302450f3544353\n24333f1a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          
          # 4. 【核心大絕】將這個檔案與資料夾全部鎖死為「唯讀」
          # 這樣 Buildozer 稍後執行時，如果企圖刪除或重置它，Linux 系統會直接駁回刪除請求！
          chmod 444 ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          chmod 555 ~/.buildozer/android/platform/android-sdk/tools/bin
          chmod 555 ~/.buildozer/android/platform/android-sdk/tools
          
          echo "防禦性 sdkmanager 鎖定完成！"

      # ==========================================================
      # 啟動最終編譯
      # ==========================================================
      - name: Build with Buildozer
        run: |
          # 這裡不加 yes 管道，直接讓它順暢跑
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
