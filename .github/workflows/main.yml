name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev uuid-dev
          pip3 install --user --upgrade buildozer Cython

      # ==========================================================
      # 正規優雅流：我們手動在外面幫它蓋一棟完全合規的 Android 基地
      # ==========================================================
      - name: Setup Custom Android SDK Environment
        run: |
          # 1. 在家目錄建立一個完全獨立、不受 Buildozer 控制的乾淨 SDK 資料夾
          mkdir -p ~/android-sdk/cmdline-tools/latest
          mkdir -p ~/android-sdk/licenses
          
          # 2. 下載官方標準的 cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          cp -r cmdline-tools/* ~/android-sdk/cmdline-tools/latest/
          
          # 3. 預先同意所有的合約 (用這棟獨立基地的 sdkmanager)
          yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # 4. 乾淨把 NDK 解壓到我們指定的獨立基地
          mkdir -p ~/android-sdk/ndk
          wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
          unzip -q ndk.zip
          mv android-ndk-r25b ~/android-sdk/ndk/25b
          
          echo "優雅的自訂 Android SDK/NDK 環境配置完成！"

      # ==========================================================
      # 執行編譯（此時 Buildozer 會乖乖讀取 spec 裡指定的自訂路徑）
      # ==========================================================
      - name: Build with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
