name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev uuid-dev
          pip3 install --user --upgrade buildozer Cython

      # ==========================================================
      # 雙重修正：配置路徑，並直接提取系統內建官方 Aidl 確保完全相容
      # ==========================================================
      - name: Pre-setup SDK Path Fixes (Aidl & Sdkmanager)
        run: |
          # 1. 配置 sdkmanager 舊路徑轉址
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          cp -r cmdline-tools/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
          ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true

          # 2. 強制建立 37.0.0 build-tools 目錄
          mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools/37.0.0/
          
          # 【關鍵修正】用 Linux find 指令在 GitHub 系統中尋找微軟官方內建、絕對相容的 aidl 執行檔
          # 並直接將它複製過來，徹底解決 Exec format error
          SYSTEM_AIDL=$(find /usr/local/lib/android/sdk/build-tools/ -name "aidl" -type f | head -n 1)
          if [ ! -z "$SYSTEM_AIDL" ]; then
            echo "找到系統內建官方 Aidl: $SYSTEM_AIDL，正在進行相容性複製..."
            cp "$SYSTEM_AIDL" ~/.buildozer/android/platform/android-sdk/build-tools/37.0.0/aidl
          else
            echo "未找到系統內建 Aidl，啟用後備方案下載..."
            wget https://github.com/skylot/jadx/raw/master/jadx-cli/txt/templates/linux/bin/aidl -O ~/.buildozer/android/platform/android-sdk/build-tools/37.0.0/aidl || true
          fi
          
          # 賦予執行權限
          chmod +x ~/.buildozer/android/platform/android-sdk/build-tools/37.0.0/aidl || true
          
          echo "sdkmanager 與官方 100% 相容版 aidl 配置完成！"

      - name: Build with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
