name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ==========================================================
      # 王道終結：直接調用專為 Buildozer 修正好的開源沙盒容器
      # ==========================================================
      - name: Build APK with Buildozer Action
        uses: Ardemwood/buildozer-action@v1
        with:
          # 這裡直接執行最純淨的打包指令，容器內部已完美解決 aidl 與 sdkmanager 的問題
          command: buildozer -v android debug

      # ==========================================================
      # 收集成品
      # ==========================================================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
