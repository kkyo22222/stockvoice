name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 確保使用 Java 17，這是新版 Android SDK 編譯必備的環境
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 安裝最新版 Buildozer 與依賴套件
      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev uuid-dev
          # 強制安裝與更新到最新版 buildozer
          pip3 install --user --upgrade buildozer Cython

      # ==========================================================
      # 執行編譯（使用 yes 指令自動接受所有 Android SDK 的授權合約）
      # ==========================================================
      - name: Build with Buildozer
        run: |
          # yes y 可以自動應答所有 Android 官方元件下載時的 "Do you accept the license? (y/N)"
          yes y | buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
