name: Build Android APK with Buildozer

on:
  workflow_dispatch: # 手動觸發

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev uuid-dev
          pip3 install --user buildozer

      # ==========================================================
      # 關鍵修正：預先配置新版 sdkmanager 並修正 aidl 路徑
      # ==========================================================
      - name: Pre-setup Android SDK cmdline-tools & aidl
        run: |
          # 1. 建立 buildozer 預期的 Android SDK 目錄結構
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          
          # 2. 下載官方最新版的 Android 命令行工具
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          
          # 3. 把解壓後的工具塞到正確的新舊路徑，相容 buildozer 的抓取
          cp -r cmdline-tools/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/
          ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          
          # 4. 建立 aidl 的軟連結修正
          mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools/33.0.1/
          sudo ln -s /usr/local/lib/android/sdk/build-tools/33.0.1/aidl ~/.buildozer/android/platform/android-sdk/build-tools/33.0.1/aidl || true

      - name: Build with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
