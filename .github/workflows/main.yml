name: Build Android APK with Buildozer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev uuid-dev
          pip3 install --user --upgrade buildozer Cython

      # ==========================================================
      # 終極破解：直接在 Buildozer 沙盒內硬塞「全版本相容」的 Android 授權憑證
      # ==========================================================
      - name: Force Inject Android SDK Licenses
        run: |
          # 1. 預先建立 Buildozer 未來會自動生成的 SDK 授權目錄
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          
          # 2. 直接把 Android 官方最核心的 5 種授權合約 Hash 值直接寫死進去檔案裡
          # 這樣不論 Buildozer 下載 build-tools 37 還是 33，通通都會直接放行！
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7431302450f3544353\n24333f1a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo -e "\n33830a68d85f413340051de1f038f9024c0840b3" > ~/.buildozer/android/platform/android-sdk/licenses/google-tv-license
          echo -e "\ne911775072043e6b6613012115948506249d44b1" > ~/.buildozer/android/platform/android-sdk/licenses/android-googletv-license
          echo -e "\n6510125f0c552403d1691afab46effd1e72cbbd9" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
          
          echo "授權文件硬核強植完成！"

      # 執行乾淨編譯
      - name: Build with Buildozer
        run: |
          buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-APK
          path: bin/*.apk
